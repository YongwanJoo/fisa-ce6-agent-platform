# Traefik v3 Helm Chart Values
# see: https://github.com/traefik/traefik-helm-chart/blob/v34.1.0/traefik/values.yaml

deployment:
  kind: Deployment
  replicas: 2 # 고가용성(HA)을 위해 2개로 증설 (Node 장애 대응)

ingressClass:
  enabled: true
  isDefaultClass: true

ingressRoute:
  dashboard:
    enabled: false
    # 보안을 위해 대시보드 노출은 IngressRoute 없이 Port-forward로만 사용 

ports:
  web:
    expose:
      default: true
    exposedPort: 80
  websecure:
    expose:
      default: true
    exposedPort: 443

# 대시보드 활성화 
additionalArguments:
  - "--api.dashboard=true"

# 리소스 설정
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
