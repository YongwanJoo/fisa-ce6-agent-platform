apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YongwanJoo/fisa-ce6-agent-platform
    targetRevision: main
    path: deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
