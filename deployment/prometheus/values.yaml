alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      receiver: 'sre-agent-webhook'
      routes: [] 
    receivers:
      - name: 'sre-agent-webhook'
        webhook_configs:
          - url: 'http://sre-agent-svc.sre-agent.svc:80/webhook/alertmanager'
            send_resolved: false
      - name: 'null'