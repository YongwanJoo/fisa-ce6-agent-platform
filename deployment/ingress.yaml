apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-agent-ingress
  namespace: sre-agent
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sre-agent-svc
                port:
                  number: 80
